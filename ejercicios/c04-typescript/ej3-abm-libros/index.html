<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ABM Libros</title>
</head>
<body>
    <h1>Catálogo y ABM de Libros</h1>

    <div style="border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; width: 300px;">
        <h3>Agregar Nuevo Libro</h3>
        <div id="errorForm" style="color: red; margin-bottom: 10px; font-weight: bold;"></div>
        
        <input type="text" id="inputTitulo" placeholder="Título"><br><br>
        <input type="text" id="inputAutor" placeholder="Autor"><br><br>
        <input type="number" id="inputPrecio" placeholder="Precio" min="1"><br><br>
        <input type="text" id="inputGenero" placeholder="Género (Opcional)"><br><br>
        <label>
            <input type="checkbox" id="inputDisponible"> Disponible
        </label><br><br>
        
        <button id="btnAgregar">Agregar Libro</button>
    </div>

    <div>
        <label for="filtroAutor">Autor:</label>
        <input type="text" id="filtroAutor">
        <button id="filtrar">Filtrar</button>
        <button id="mostrarDisponibles">Solo disponibles</button>
        <button id="mostrarTodos">Ver todos</button>
    </div>

    <p id="stats"></p>
    <ul id="listado"></ul>

    <script src="app.js"></script>
</body>
</html>
